<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - SBEMS</title>
    <link rel="stylesheet" href="/public/css/style.css" />
  </head>
  <body>
    <div class="auth-wrap">
      <div class="card auth-card">
        <h2>Login</h2>
        <p class="muted">Sign in to monitor smart building energy orchestration.</p>
        <form id="login-form" class="form-grid">
          <div>
            <label>Email</label>
            <input id="email" type="email" required />
          </div>
          <div>
            <label>Password</label>
            <input id="password" type="password" required minlength="6" />
          </div>
          <label class="inline"><input id="remember" type="checkbox" /> Remember me</label>
          <button class="btn btn-primary" type="submit">Login</button>
          <a href="/register" class="muted">No account? Register</a>
        </form>
      </div>
    </div>

    <script src="/public/js/auth.js"></script>
    <script src="/public/js/ui.js"></script>
    <script>
      document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const payload = {
          email: document.getElementById("email").value,
          password: document.getElementById("password").value
        };

        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) return showToast(data.message || "Login failed", "error");

        setToken(data.token);
        setUser(data.user);
        if (document.getElementById("remember").checked) {
          localStorage.setItem("sbes_remember", "1");
        }
        location.href = "/dashboard";
      });
    </script>
  </body>
</html>
