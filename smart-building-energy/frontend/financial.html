<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Financial Analysis - SBEMS</title>
    <link rel="stylesheet" href="/public/css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">SBEMS</div>
        <a href="/dashboard">Dashboard</a>
        <a href="/analytics">Analytics</a>
        <a href="/forecast">Forecast</a>
        <a href="/buildings">Buildings</a>
        <a href="/financial">Financial</a>
        <a href="/contact">Contact</a>
        <a href="/about">About</a>
        <a href="#" data-logout>Logout</a>
      </aside>

      <main class="main">
        <h2>Financial Analysis and NPV</h2>
        <section class="panel">
          <div class="form-grid" style="grid-template-columns: repeat(4, minmax(0, 1fr))">
            <div><label>Scenario</label><select id="scenario"><option value="with_wind">PV + Wind + Storage</option><option value="without_wind">PV + Storage</option></select></div>
            <div><label>Discount Rate</label><input id="discountRate" type="number" step="0.01" value="0.07" /></div>
            <div><label>O&M ($/year)</label><input id="om" type="number" value="1200" /></div>
            <div><label>Tariff ($/kWh)</label><input id="tariff" type="number" step="0.001" value="0.141" /></div>
          </div>
        </section>

        <section class="kpi-grid" style="margin-top:12px">
          <div class="panel kpi"><div class="muted">Selected Scenario</div><div class="value" id="scenario-title">-</div></div>
          <div class="panel kpi"><div class="muted">Breakeven Year</div><div class="value" id="breakeven">-</div></div>
          <div class="panel kpi"><div class="muted">CAPEX</div><div class="value" id="capex">-</div></div>
        </section>

        <section class="panel" style="margin-top:12px">
          <h3>NPV Over 30 Years (Figure 18-style)</h3>
          <div style="height:300px"><canvas id="npvChart"></canvas></div>
        </section>

        <section class="charts-grid" style="margin-top:12px">
          <div class="panel">
            <h3>Summary Table 9</h3>
            <div class="table-wrap"><table><tbody id="table9"></tbody></table></div>
          </div>
          <div class="panel">
            <h3>Summary Table 10</h3>
            <div class="table-wrap"><table><tbody id="table10"></tbody></table></div>
          </div>
        </section>
      </main>
    </div>

    <script src="/public/js/auth.js"></script>
    <script src="/public/js/ui.js"></script>
    <script src="/public/js/charts.js"></script>
    <script src="/public/js/financial.js"></script>
  </body>
</html>
